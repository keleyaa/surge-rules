name: Auto Update Rules

on:
  schedule:
    # 每天 UTC 21:00 (北京时间 05:00) 自动更新
    - cron: '0 21 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python3 scripts/update.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet rules/ || echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Files changed:"
          git diff --stat rules/

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u '+%Y-%m-%d')
          git add rules/
          git commit -m "chore: auto-update game rules ($DATE)"
          git push
